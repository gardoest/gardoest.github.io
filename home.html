<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSM-GANG - DLE Score Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
            padding: 20px;
            max-width: 800px;
            text-align: center;
        }

        .title-section {
            position: relative;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            line-height: 1;
        }

        .title-letter {
            display: inline-block;
            position: relative;
            transition: transform 0.1s ease-out;
        }

        .subtitle {
            font-size: 18px;
            color: #666666;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.6;
            max-width: 500px;
        }

        .nav-section {
            display: flex;
            gap: 24px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 14px 36px;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-2px);
        }

        .nav-btn.secondary {
            background: #ffffff;
            color: #000000;
            border-color: #000000;
        }

        .nav-btn.secondary:hover {
            background: #000000;
            color: #ffffff;
        }

        .decorative-line {
            width: 120px;
            height: 2px;
            background: #000000;
            margin: 30px 0;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 48px;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 14px;
            }

            .nav-section {
                flex-direction: column;
                gap: 12px;
            }

            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decorative-line"></div>

        <div class="title-section" id="titleSection">
            <div class="title" id="titleText">FSM-GANG</div>
        </div>

        <div class="decorative-line"></div>

        <div class="subtitle">
            Daily competition tracker for five friends.<br>
            Track scores across Wordle, TimeGuessr, Loldle, and Maptap.
        </div>

        <div class="nav-section">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="stats.html" class="nav-btn secondary">Player Profiles</a>
        </div>
    </div>

    <script>
        // Add animation keyframes first
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInSlide {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);

        const titleText = document.getElementById('titleText');
        const text = 'FSM-GANG';

        // Create individual letter elements
        titleText.innerHTML = text.split('').map((letter, idx) =>
            `<span class="title-letter" data-index="${idx}">${letter}</span>`
        ).join('');

        const letters = document.querySelectorAll('.title-letter');
        const magnetRange = 120; // How far from letters the mouse effect triggers

        // Staggered fade-in animation
        letters.forEach((letter, idx) => {
            letter.style.animation = `fadeInSlide 0.6s ease-out ${idx * 0.05}s forwards`;
        });

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            letters.forEach((letter) => {
                const rect = letter.getBoundingClientRect();
                const letterCenterX = rect.left + rect.width / 2;
                const letterCenterY = rect.top + rect.height / 2;

                const distX = mouseX - letterCenterX;
                const distY = mouseY - letterCenterY;
                const distance = Math.sqrt(distX * distX + distY * distY);

                if (distance < magnetRange) {
                    // Calculate pull strength based on distance
                    const strength = (1 - distance / magnetRange) * 0.7;
                    const pullX = (distX / distance) * strength * 30;
                    const pullY = (distY / distance) * strength * 30;

                    letter.style.transform = `translate(${pullX}px, ${pullY}px)`;
                } else {
                    letter.style.transform = 'translate(0, 0)';
                }
            });
        });

        // Reset on mouse leave
        document.addEventListener('mouseleave', () => {
            letters.forEach(letter => {
                letter.style.transform = 'translate(0, 0)';
            });
        });
    </script>
</body>
</html>
