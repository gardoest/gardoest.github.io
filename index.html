<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLE - Daily Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #00d4ff;
            font-weight: 300;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            color: #1a1a2e;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .rank {
            font-size: 1.5em;
            font-weight: 800;
            width: 50px;
            text-align: center;
            margin-right: 15px;
        }

        .rank-1 { color: #FFD700; }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }
        .rank-other { color: #00d4ff; }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 4px;
        }

        .player-score {
            font-size: 2em;
            font-weight: 800;
            color: #00d4ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }

        .stat-item h3 {
            color: #00d4ff;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
        }

        .stat-player {
            color: #888;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .error {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            color: #ff9999;
        }

        .success {
            background: rgba(100, 255, 100, 0.2);
            border: 1px solid rgba(100, 255, 100, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            color: #99ff99;
        }

        .timestamp {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .full-width-card {
            grid-column: 1 / -1;
        }

        .games-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .games-table th,
        .games-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .games-table th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .games-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .game-name {
            color: #00d4ff;
            font-weight: 600;
        }

        .status-message {
            text-align: center;
            color: #888;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ DLE</h1>
            <p class="subtitle">Daily Leaderboard</p>
            <div class="controls">
                <button onclick="loadData()">
                    <span id="refresh-icon">🔄</span> Oppdater
                </button>
                <button onclick="toggleDebug()">🔧 Debug</button>
            </div>
            <div id="status-message"></div>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>🏆 Stillingstabell</h2>
                <div id="leaderboard" class="leaderboard">
                    <div class="status-message">Laster data...</div>
                </div>
            </div>

            <div class="card">
                <h2>📊 Statistikk</h2>
                <div id="stats" class="stats-grid">
                    <div class="status-message">Laster data...</div>
                </div>
            </div>

            <div class="card full-width-card">
                <h2>🎮 Poeng per Konkuranse</h2>
                <div id="games-breakdown">
                    <div class="status-message">Laster data...</div>
                </div>
            </div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        const SHEET_ID = '13vdyTKv0vgLBnihxBFeriKzkNbvOt1A3n-c3h5ur8g4';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        const PARTICIPANTS = ['Gard', 'Jone', 'Elias', 'Herman', 'Sindre'];
        const GAMES = ['Wordle', 'Timeguessr', 'Loldle', 'Maptap'];

        const GAME_RULES = {
            'Wordle': { type: 'lowest' },      // Lavest gjetter = vinner
            'Timeguessr': { type: 'highest' }, // Høyest score = vinner
            'Loldle': { type: 'lowest' },      // Lavest gjetter = vinner
            'Maptap': { type: 'highest' }      // Høyest score = vinner
        };

        let debugMode = false;
        let cachedData = null;

        async function loadData() {
            const refreshBtn = document.getElementById('refresh-icon');
            refreshBtn.textContent = '⏳';

            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const csv = await response.text();
                const data = parseCSV(csv);
                cachedData = data;

                renderLeaderboard(data);
                renderStats(data);
                renderGamesBreakdown(data);

                refreshBtn.textContent = '✓';
                setTimeout(() => { refreshBtn.textContent = '🔄'; }, 1500);

                document.getElementById('status-message').innerHTML = '<div class="success">✓ Data oppdatert</div>';
                updateTimestamp();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status-message').innerHTML =
                    `<div class="error">⚠️ Feil ved lasting av data: ${error.message}</div>`;
                refreshBtn.textContent = '🔄';
            }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return { records: [], scores: {} };

            const header = lines[0].split(',').map(h => h.trim());
            const records = [];

            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(',').map(c => c.trim());
                if (cells.length < 3) continue;

                const record = {
                    date: cells[0],
                    game: cells[1],
                    scores: {}
                };

                for (let j = 0; j < PARTICIPANTS.length; j++) {
                    const scoreStr = cells[2 + j] || '';
                    const score = scoreStr === '' ? null : parseFloat(scoreStr);
                    record.scores[PARTICIPANTS[j]] = score;
                }

                records.push(record);
            }

            // Beregn totalt poeng
            const playerScores = {};
            PARTICIPANTS.forEach(p => { playerScores[p] = 0; });

            records.forEach(record => {
                const game = record.game.trim();
                const participants = PARTICIPANTS.filter(p => record.scores[p] !== null);

                if (participants.length === 0) return;

                // Sorter etter scoring regel
                const rule = GAME_RULES[game];
                let sorted;

                if (rule.type === 'lowest') {
                    sorted = participants.sort((a, b) => record.scores[a] - record.scores[b]);
                } else {
                    sorted = participants.sort((a, b) => record.scores[b] - record.scores[a]);
                }

                // Tildel poeng basert på antall deltakere
                const pointsPerPlace = participants.length;
                sorted.forEach((player, idx) => {
                    const points = pointsPerPlace - idx;
                    playerScores[player] += points;
                });
            });

            return { records, playerScores };
        }

        function renderLeaderboard(data) {
            const sorted = PARTICIPANTS.sort((a, b) => data.playerScores[b] - data.playerScores[a]);

            const html = sorted.map((player, idx) => {
                const rank = idx + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';

                return `
                    <div class="leaderboard-item">
                        <div class="rank ${rankClass}">${medal || rank}</div>
                        <div class="player-info">
                            <div class="player-name">${player}</div>
                            <div class="player-score">${data.playerScores[player]} poeng</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('leaderboard').innerHTML = html;
        }

        function renderStats(data) {
            const gameStats = {};

            GAMES.forEach(game => {
                const gameRecords = data.records.filter(r => r.game.trim() === game);
                if (gameRecords.length === 0) return;

                const rule = GAME_RULES[game];
                let bestRecord = gameRecords[0];
                let bestPlayer = null;
                let bestScore = null;

                gameRecords.forEach(record => {
                    PARTICIPANTS.forEach(player => {
                        if (record.scores[player] === null) return;

                        if (bestScore === null) {
                            bestScore = record.scores[player];
                            bestPlayer = player;
                            bestRecord = record;
                        } else if (rule.type === 'lowest') {
                            if (record.scores[player] < bestScore) {
                                bestScore = record.scores[player];
                                bestPlayer = player;
                                bestRecord = record;
                            }
                        } else {
                            if (record.scores[player] > bestScore) {
                                bestScore = record.scores[player];
                                bestPlayer = player;
                                bestRecord = record;
                            }
                        }
                    });
                });

                gameStats[game] = { player: bestPlayer, score: bestScore, date: bestRecord.date };
            });

            const html = Object.entries(gameStats).map(([game, stat]) => {
                if (!stat.player) return '';
                return `
                    <div class="stat-item">
                        <h3>${game}</h3>
                        <div class="stat-value">${stat.score}</div>
                        <div class="stat-player">🏆 ${stat.player} (${stat.date})</div>
                    </div>
                `;
            }).join('');

            document.getElementById('stats').innerHTML = html || '<div class="status-message">Ingen data</div>';
        }

        function renderGamesBreakdown(data) {
            const html = `
                <table class="games-table">
                    <thead>
                        <tr>
                            <th>Dato</th>
                            <th>Konkuranse</th>
                            ${PARTICIPANTS.map(p => `<th>${p}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${data.records.map(record => `
                            <tr>
                                <td>${record.date}</td>
                                <td class="game-name">${record.game}</td>
                                ${PARTICIPANTS.map(p => `<td>${record.scores[p] !== null ? record.scores[p] : '-'}</td>`).join('')}
                            </tr>
                        `).reverse().join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('games-breakdown').innerHTML = data.records.length > 0 ? html : '<div class="status-message">Ingen data</div>';
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = `Sist oppdatert: ${now.toLocaleString('no-NO')}`;
        }

        function toggleDebug() {
            debugMode = !debugMode;
            if (debugMode && cachedData) {
                console.log('Data:', cachedData);
                alert('Debug info logget til console (F12)');
            }
        }

        // Last data ved sidepåload
        window.addEventListener('load', loadData);

        // Auto-refresh hver 5. minutt
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
