<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLE - Daily Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a1a;
            --bg-card: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-blue: #00d4ff;
            --accent-green: #00ff41;
            --accent-gold: #ffd700;
            --accent-purple: #d64aff;
            --border-color: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.05);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(212, 74, 255, 0.05));
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 2px;
        }

        .header-date {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-behavior: smooth;
        }

        .tab {
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        /* High Scores Section */
        .high-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .high-scores {
                grid-template-columns: 1fr;
            }
        }

        .score-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(0, 212, 255, 0.05));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease forwards;
        }

        .score-card:nth-child(1) { animation-delay: 0s; }
        .score-card:nth-child(2) { animation-delay: 0.1s; }
        .score-card:nth-child(3) { animation-delay: 0.2s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-card.high-score {
            border-color: var(--accent-gold);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), var(--bg-card));
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            }
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 900;
        }

        .rank-badge.rank-1 {
            background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
            animation: bounce 1s ease infinite;
        }

        .rank-badge.rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a9a9a9);
        }

        .rank-badge.rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b8860b);
        }

        .rank-badge.rank-other {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .score-card-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .score-card-value {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Poppins', sans-serif;
        }

        /* Stats Table */
        .stats-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease 0.3s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .stats-table thead {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), transparent);
            border-bottom: 2px solid var(--border-color);
        }

        .stats-table th {
            padding: 16px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-blue);
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .stats-table th:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .stats-table th.sortable::after {
            content: ' ⇅';
            opacity: 0.5;
        }

        .stats-table th.sort-asc::after {
            content: ' ↑';
            opacity: 1;
            color: var(--accent-green);
        }

        .stats-table th.sort-desc::after {
            content: ' ↓';
            opacity: 1;
            color: var(--accent-green);
        }

        .stats-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .stats-table tbody tr {
            transition: all 0.2s ease;
        }

        .stats-table tbody tr:hover {
            background: var(--hover-bg);
        }

        .player-cell {
            font-weight: 600;
            color: var(--text-primary);
        }

        .points-cell {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 16px;
        }

        .avg-cell {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .games-cell {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Game Highlights */
        .game-highlights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease 0.2s backwards;
        }

        @media (max-width: 768px) {
            .game-highlights {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .game-highlight-card {
            background: linear-gradient(135deg, var(--bg-card), rgba(0, 255, 65, 0.05));
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .game-highlight-card:hover {
            border-color: var(--accent-green);
            background: linear-gradient(135deg, var(--bg-card), rgba(0, 255, 65, 0.1));
            transform: translateY(-4px);
        }

        .game-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .game-name {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .game-best-score {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 6px;
        }

        .game-best-player {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Game History */
        .history-section {
            margin-top: 30px;
            animation: fadeIn 0.6s ease 0.4s backwards;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-blue), var(--accent-green));
            border-radius: 2px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .filter-btn {
            padding: 8px 12px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .filter-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #000;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            font-size: 14px;
        }

        .history-table thead {
            background: linear-gradient(90deg, rgba(0, 255, 65, 0.1), transparent);
            border-bottom: 2px solid var(--border-color);
        }

        .history-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-green);
            font-size: 12px;
        }

        .history-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .history-table tbody tr {
            transition: all 0.2s ease;
        }

        .history-table tbody tr:hover {
            background: var(--hover-bg);
        }

        .date-cell {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .game-cell {
            font-weight: 600;
            color: var(--accent-green);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0, 212, 255, 0.15);
            border-radius: 4px;
            font-weight: 600;
            color: var(--accent-blue);
            font-size: 12px;
        }

        /* Add Score Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            color: #000;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 48px rgba(0, 212, 255, 0.5);
        }

        .fab:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .fab {
                bottom: 20px;
                right: 20px;
                width: 56px;
                height: 56px;
                font-size: 20px;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeInModal 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeInModal {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUpModal 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        @keyframes slideUpModal {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-blue);
        }

        .form-input,
        .form-select,
        .form-textarea {
            padding: 12px 14px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: var(--hover-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.1);
        }

        .form-message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .form-message.success {
            background: rgba(0, 255, 65, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 65, 0.3);
        }

        .form-message.error {
            background: rgba(255, 0, 0, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .form-message.loading {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 16px;
            }

            header {
                padding: 16px;
            }

            .header-content {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .logo {
                font-size: 24px;
            }

            .tabs {
                gap: 4px;
            }

            .tab {
                padding: 8px 12px;
                font-size: 12px;
            }

            .stats-table th,
            .stats-table td {
                padding: 12px 8px;
                font-size: 12px;
            }

            .modal-content {
                padding: 24px;
            }

            .high-scores {
                gap: 12px;
            }

            .score-card {
                padding: 16px;
            }
        }

        /* Loading State */
        @keyframes shimmer {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .loading {
            animation: shimmer 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo">⚡ DLE</div>
                <div class="header-date" id="current-date"></div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" data-tab="daily">Daily</button>
                    <button class="tab" data-tab="weekly">Weekly</button>
                    <button class="tab" data-tab="monthly">Monthly</button>
                    <button class="tab" data-tab="alltime">All Time</button>
                </div>

                <!-- High Scores -->
                <div class="high-scores" id="high-scores">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-text">Loading scores...</div>
                    </div>
                </div>

                <!-- Game Highlights (Best Scores per Game) -->
                <div class="section-title" style="margin-top: 30px; margin-bottom: 16px;">Best Game Scores</div>
                <div class="game-highlights" id="game-highlights">
                    <div class="empty-state">
                        <div class="empty-state-icon">🎮</div>
                        <div class="empty-state-text">Loading...</div>
                    </div>
                </div>

                <!-- Stats Table -->
                <div class="stats-section">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="name">Player</th>
                                <th class="sortable" data-sort="points">Points</th>
                                <th class="sortable" data-sort="average">Average</th>
                                <th class="sortable" data-sort="games">Games</th>
                            </tr>
                        </thead>
                        <tbody id="stats-body">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 40px;">
                                    <span style="color: var(--text-secondary);">Loading...</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Game History -->
                <div class="history-section">
                    <div class="section-title">Recent Games</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All Games</button>
                        <button class="filter-btn" data-filter="Wordle">Wordle</button>
                        <button class="filter-btn" data-filter="Timeguessr">TimeGuessr</button>
                        <button class="filter-btn" data-filter="Loldle">Loldle</button>
                        <button class="filter-btn" data-filter="Maptap">Maptap</button>
                    </div>
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Game</th>
                                <th>Scores</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <tr>
                                <td colspan="3" style="text-align: center; padding: 40px;">
                                    <span style="color: var(--text-secondary);">Loading...</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Score Button -->
    <button class="fab" id="add-score-btn">+</button>

    <!-- Modal -->
    <div class="modal" id="score-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Add Score</div>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>

            <form id="score-form">
                <div class="form-group">
                    <label class="form-label">Player</label>
                    <select class="form-select" id="form-player" required>
                        <option value="">Select player...</option>
                        <option value="Gard">Gard</option>
                        <option value="Jone">Jone</option>
                        <option value="Elias">Elias</option>
                        <option value="Herman">Herman</option>
                        <option value="Sindre">Sindre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Results</label>
                    <textarea class="form-textarea" id="form-results" placeholder="Paste your game results here (Wordle, TimeGuessr, Loldle, Maptap)..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Webhook URL</label>
                    <input type="text" class="form-input" id="form-webhook" placeholder="https://script.google.com/macros/..." required>
                </div>

                <div id="form-message"></div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Parse & Save</button>
                    <button type="button" class="btn-secondary" id="form-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SHEET_ID = '13vdyTKv0vgLBnihxBFeriKzkNbvOt1A3n-c3h5ur8g4';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
        const VERCEL_API = 'https://gardoest-github-io.vercel.app/api/parse-results';

        const PARTICIPANTS = ['Gard', 'Jone', 'Elias', 'Herman', 'Sindre'];
        const GAMES = ['Wordle', 'TimeGuessr', 'Loldle', 'Maptap'];

        const GAME_RULES = {
            'Wordle': { type: 'lowest' },
            'TimeGuessr': { type: 'highest' },
            'Loldle': { type: 'lowest' },
            'Maptap': { type: 'highest' }
        };

        // Normalize game names to standard format
        function normalizeGameName(name) {
            const normalized = {
                'timeguessr': 'TimeGuessr',
                'time guessr': 'TimeGuessr',
                'wordle': 'Wordle',
                'loldle': 'Loldle',
                'maptap': 'Maptap',
                'map tap': 'Maptap'
            };
            return normalized[name.toLowerCase().trim()] || name;
        }

        let currentTab = 'daily';
        let currentFilter = 'all';
        let allData = null;
        let sortColumn = 'points';
        let sortDir = 'desc';

        // Initialize
        function init() {
            updateDate();
            loadWebhookUrl();
            attachEventListeners();
            loadData();
            setInterval(loadData, 5 * 60 * 1000);
        }

        function updateDate() {
            const now = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
            document.getElementById('current-date').textContent = dateStr;
        }

        function attachEventListeners() {
            // Tabs
            document.querySelectorAll('.tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentTab = e.target.dataset.tab;
                    renderAll();
                });
            });

            // Sorting
            document.querySelectorAll('[data-sort]').forEach(header => {
                header.addEventListener('click', () => {
                    const newSort = header.dataset.sort;
                    if (sortColumn === newSort) {
                        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortColumn = newSort;
                        sortDir = 'desc';
                    }
                    updateSortUI();
                    renderStats(allData);
                });
            });

            // Filters
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderHistory(allData);
                });
            });

            // Modal
            document.getElementById('add-score-btn').addEventListener('click', () => {
                document.getElementById('score-modal').classList.add('active');
            });

            document.getElementById('modal-close').addEventListener('click', closeModal);
            document.getElementById('form-cancel').addEventListener('click', closeModal);
            document.getElementById('score-modal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('score-modal')) closeModal();
            });

            // Form
            document.getElementById('score-form').addEventListener('submit', submitScore);
        }

        function closeModal() {
            document.getElementById('score-modal').classList.remove('active');
            document.getElementById('score-form').reset();
            document.getElementById('form-message').innerHTML = '';
        }

        function loadWebhookUrl() {
            const defaultWebhook = 'https://script.google.com/macros/s/AKfycbz27Bz98TeAWcEjP_ufdoh5fMNoo6t544MSEl1Q2fgtlpbT4hqpclCU4t8ZJd1wvbR5/exec';
            const saved = localStorage.getItem('webhookUrl') || defaultWebhook;
            document.getElementById('form-webhook').value = saved;

            document.getElementById('form-webhook').addEventListener('change', (e) => {
                localStorage.setItem('webhookUrl', e.target.value);
            });
        }

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const csv = await response.text();
                allData = parseCSV(csv);
                renderAll();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return { records: [], playerScores: {} };

            const records = [];
            const playerScores = {};
            PARTICIPANTS.forEach(p => { playerScores[p] = 0; });

            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(',').map(c => c.trim());
                if (cells.length < 3) continue;

                const record = {
                    date: cells[0],
                    game: normalizeGameName(cells[1]),
                    scores: {}
                };

                for (let j = 0; j < PARTICIPANTS.length; j++) {
                    const scoreStr = cells[2 + j] || '';
                    const score = scoreStr === '' ? null : parseFloat(scoreStr);
                    record.scores[PARTICIPANTS[j]] = score;
                }

                records.push(record);

                // Calculate points
                const game = record.game.trim();
                const participants = PARTICIPANTS.filter(p => record.scores[p] !== null);

                if (participants.length > 0) {
                    const rule = GAME_RULES[game];
                    if (rule) {
                        let sorted;
                        if (rule.type === 'lowest') {
                            sorted = participants.sort((a, b) => record.scores[a] - record.scores[b]);
                        } else {
                            sorted = participants.sort((a, b) => record.scores[b] - record.scores[a]);
                        }

                        const pointsPerPlace = participants.length;
                        sorted.forEach((player, idx) => {
                            const points = pointsPerPlace - idx;
                            playerScores[player] += points;
                        });
                    }
                }
            }

            return { records: records.reverse(), playerScores };
        }

        function renderAll() {
            if (!allData) return;
            renderHighScores(allData);
            renderGameHighlights(allData);
            renderStats(allData);
            renderHistory(allData);
        }

        function renderHighScores(data) {
            const filteredRecords = getFilteredRecords();

            // Recalculate scores for the time period
            const periodScores = {};
            PARTICIPANTS.forEach(p => { periodScores[p] = 0; });

            filteredRecords.forEach(record => {
                const game = normalizeGameName(record.game);
                const participants = PARTICIPANTS.filter(p => record.scores[p] !== null);

                if (participants.length === 0) return;

                const rule = GAME_RULES[game];
                if (!rule) return;

                let sorted;
                if (rule.type === 'lowest') {
                    sorted = participants.sort((a, b) => record.scores[a] - record.scores[b]);
                } else {
                    sorted = participants.sort((a, b) => record.scores[b] - record.scores[a]);
                }

                const pointsPerPlace = participants.length;
                sorted.forEach((player, idx) => {
                    const points = pointsPerPlace - idx;
                    periodScores[player] += points;
                });
            });

            const sorted = PARTICIPANTS.sort((a, b) => periodScores[b] - periodScores[a]);
            const topN = currentTab === 'alltime' ? 10 : 3;
            const topPlayers = sorted.slice(0, topN);

            const html = topPlayers.map((player, idx) => {
                const rank = idx + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                const points = periodScores[player];
                const isHighScore = rank === 1;

                return `
                    <div class="score-card ${isHighScore ? 'high-score' : ''}">
                        <div class="rank-badge rank-${rank}">${rank}</div>
                        <div class="score-card-name">${player}</div>
                        <div class="score-card-value">${points}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('high-scores').innerHTML = html;
        }

        function getDateRange() {
            const today = new Date();
            let startDate = new Date(today);

            if (currentTab === 'daily') {
                startDate.setDate(today.getDate());
            } else if (currentTab === 'weekly') {
                startDate.setDate(today.getDate() - today.getDay());
            } else if (currentTab === 'monthly') {
                startDate.setDate(1);
            } else {
                startDate = new Date('2000-01-01');
            }

            startDate.setHours(0, 0, 0, 0);
            return startDate;
        }

        function getFilteredRecords() {
            if (!allData) return [];
            const startDate = getDateRange();
            return allData.records.filter(record => {
                const recordDate = new Date(record.date);
                recordDate.setHours(0, 0, 0, 0);
                return recordDate >= startDate;
            });
        }

        function renderGameHighlights(data) {
            const filteredRecords = getFilteredRecords();
            const gameIcons = {
                'Wordle': '📖',
                'TimeGuessr': '🌍',
                'Loldle': '🎮',
                'Maptap': '🗺️'
            };

            const gameHighlights = {};
            GAMES.forEach(game => {
                gameHighlights[game] = { score: null, player: null };
            });

            filteredRecords.forEach(record => {
                const game = normalizeGameName(record.game);
                if (!GAMES.includes(game)) return;

                const rule = GAME_RULES[game];
                if (!rule) return;

                PARTICIPANTS.forEach(player => {
                    if (record.scores[player] === null) return;
                    const score = record.scores[player];

                    if (gameHighlights[game].score === null) {
                        gameHighlights[game] = { score, player };
                    } else if (rule.type === 'lowest') {
                        if (score < gameHighlights[game].score) {
                            gameHighlights[game] = { score, player };
                        }
                    } else {
                        if (score > gameHighlights[game].score) {
                            gameHighlights[game] = { score, player };
                        }
                    }
                });
            });

            const html = GAMES.map(game => {
                const highlight = gameHighlights[game];
                if (!highlight.score) return '';
                return `
                    <div class="game-highlight-card">
                        <div class="game-icon">${gameIcons[game]}</div>
                        <div class="game-name">${game}</div>
                        <div class="game-best-score">${highlight.score}</div>
                        <div class="game-best-player">🏆 ${highlight.player}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('game-highlights').innerHTML = html || '<div class="empty-state"><div class="empty-state-text">No games yet</div></div>';
        }

        function renderStats(data) {
            const filteredRecords = getFilteredRecords();

            // Recalculate scores for the time period
            const periodScores = {};
            PARTICIPANTS.forEach(p => { periodScores[p] = 0; });

            filteredRecords.forEach(record => {
                const game = normalizeGameName(record.game);
                const participants = PARTICIPANTS.filter(p => record.scores[p] !== null);

                if (participants.length === 0) return;

                const rule = GAME_RULES[game];
                if (!rule) return;

                let sorted;
                if (rule.type === 'lowest') {
                    sorted = participants.sort((a, b) => record.scores[a] - record.scores[b]);
                } else {
                    sorted = participants.sort((a, b) => record.scores[b] - record.scores[a]);
                }

                const pointsPerPlace = participants.length;
                sorted.forEach((player, idx) => {
                    const points = pointsPerPlace - idx;
                    periodScores[player] += points;
                });
            });

            const sorted = PARTICIPANTS.map(p => ({
                name: p,
                points: periodScores[p],
                games: filteredRecords.filter(r => {
                    const participants = PARTICIPANTS.filter(q => r.scores[q] !== null);
                    return r.scores[p] !== null && participants.includes(p);
                }).length
            })).filter(p => p.games > 0);

            sorted.forEach(p => {
                p.average = p.games > 0 ? (p.points / p.games).toFixed(1) : '0';
            });

            // Sort
            sorted.sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                if (sortColumn === 'name') {
                    return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                }
                aVal = parseFloat(aVal);
                bVal = parseFloat(bVal);
                return sortDir === 'asc' ? aVal - bVal : bVal - aVal;
            });

            const html = sorted.map(p => `
                <tr>
                    <td class="player-cell">${p.name}</td>
                    <td class="points-cell">${p.points}</td>
                    <td class="avg-cell">${p.average}</td>
                    <td class="games-cell">${p.games}</td>
                </tr>
            `).join('');

            document.getElementById('stats-body').innerHTML = html || '<tr><td colspan="4" style="text-align: center; padding: 40px; color: var(--text-secondary);">No data</td></tr>';
        }

        function renderHistory(data) {
            let filtered = getFilteredRecords();
            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.game === currentFilter);
            }

            const html = filtered.map(record => {
                const scoreHtml = PARTICIPANTS.map(p => {
                    const score = record.scores[p];
                    if (score === null) return '<span style="color: var(--text-secondary);">—</span>';
                    return `<span class="score-badge">${p}: ${score}</span>`;
                }).join(' ');

                return `
                    <tr>
                        <td class="date-cell">${record.date}</td>
                        <td class="game-cell">${record.game}</td>
                        <td>${scoreHtml}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('history-body').innerHTML = html || '<tr><td colspan="3" style="text-align: center; padding: 40px; color: var(--text-secondary);">No games</td></tr>';
        }

        function updateSortUI() {
            document.querySelectorAll('[data-sort]').forEach(h => {
                h.classList.remove('sort-asc', 'sort-desc');
            });
            const active = document.querySelector(`[data-sort="${sortColumn}"]`);
            if (active) {
                active.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
        }

        async function submitScore(e) {
            e.preventDefault();
            const player = document.getElementById('form-player').value;
            const results = document.getElementById('form-results').value;
            const webhook = document.getElementById('form-webhook').value;
            const msgDiv = document.getElementById('form-message');

            if (!player || !results.trim() || !webhook) {
                msgDiv.innerHTML = '<div class="form-message error">Please fill in all fields</div>';
                return;
            }

            msgDiv.innerHTML = '<div class="form-message loading">⏳ Parsing with AI...</div>';

            try {
                const response = await fetch(VERCEL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: results,
                        player,
                        date: new Date().toISOString().split('T')[0],
                        webhookUrl: webhook
                    })
                });

                if (!response.ok) throw new Error(`API error: ${response.statusText}`);
                const result = await response.json();

                if (result.success) {
                    msgDiv.innerHTML = '<div class="form-message success">✅ Saved successfully!</div>';
                    setTimeout(() => {
                        closeModal();
                        loadData();
                    }, 1500);
                } else {
                    throw new Error(result.error || 'Unknown error');
                }
            } catch (error) {
                msgDiv.innerHTML = `<div class="form-message error">❌ Error: ${error.message}</div>`;
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
