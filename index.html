<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSM-GANG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Title */
        .title {
            position: relative;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.7) 0%, rgba(26, 26, 26, 0.7) 100%),
                        url('banner.avif') center / cover no-repeat;
            background-blend-mode: overlay;
            padding: 120px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ffffff;
            min-height: 200px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            border: 2px solid #ffffff;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: #ffffff;
            color: #0a0a0a;
        }

        .title-text {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 768px) {
            .title {
                padding: 60px 20px;
                min-height: 150px;
                flex-direction: column;
                gap: 20px;
            }
            .title-text {
                font-size: 40px;
                letter-spacing: 2px;
            }
            .nav-links {
                width: 100%;
                justify-content: center;
            }
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px 20px;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 15px;
            overflow-x: auto;
        }

        .tab {
            padding: 8px 0;
            background: none;
            border: none;
            color: #808080;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab:hover {
            color: #ffffff;
        }

        .tab.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        /* High Scores */
        .high-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .high-scores {
                grid-template-columns: 1fr;
            }
        }

        .score-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            padding: 24px;
            animation: slideUp 0.6s ease forwards;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .score-card:hover {
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .score-card:nth-child(1) { animation-delay: 0s; }
        .score-card:nth-child(2) { animation-delay: 0.05s; }
        .score-card:nth-child(3) { animation-delay: 0.1s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rank-badge {
            display: inline-block;
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 700;
            line-height: 32px;
            text-align: center;
        }

        .score-card-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .score-card-value {
            font-size: 36px;
            font-weight: 900;
            font-family: 'Inter', monospace;
        }

        /* Game Highlights */
        .game-highlights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .game-highlights {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .game-highlight-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .game-highlight-card:hover {
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .game-name {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #808080;
        }

        .game-best-score {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 4px;
            font-family: 'Inter', monospace;
        }

        .game-best-player {
            font-size: 11px;
            color: #808080;
            font-weight: 500;
        }

        /* Stats Table */
        .stats-section {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border: none;
        }

        .stats-table thead {
            border-bottom: 2px solid #ffffff;
            background: #0f0f0f;
        }

        .stats-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .stats-table th:hover {
            color: #ffffff;
        }

        .stats-table th.sortable::after {
            content: ' ⇅';
            opacity: 0.5;
        }

        .stats-table th.sort-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        .stats-table th.sort-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        .stats-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #333333;
            border-right: 1px solid #333333;
        }

        .stats-table td:last-child {
            border-right: none;
        }

        .stats-table tbody tr:hover {
            background: #0f0f0f;
        }

        .player-cell {
            font-weight: 600;
        }

        .points-cell {
            font-weight: 700;
            font-size: 16px;
        }

        /* Chart */
        .chart-container {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .chart-container canvas {
            max-height: 400px;
        }

        /* Game History */
        .history-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #ffffff;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .filter-btn {
            padding: 8px 12px;
            background: #0a0a0a;
            border: 2px solid #ffffff;
            border-radius: 4px;
            color: #808080;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        .filter-btn.active {
            background: #ffffff;
            border-color: #ffffff;
            color: #000000;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            overflow: hidden;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .history-table thead {
            border-bottom: 2px solid #ffffff;
            background: #0f0f0f;
        }

        .history-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            font-size: 12px;
        }

        .history-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #333333;
            border-right: 1px solid #333333;
        }

        .history-table td:last-child {
            border-right: none;
        }

        .history-table tbody tr:hover {
            background: #0f0f0f;
        }

        .date-cell {
            color: #808080;
            font-size: 13px;
            font-weight: 500;
        }

        .game-cell {
            font-weight: 600;
        }

        .score-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #1a1a1a;
            border-radius: 4px;
            font-weight: 600;
            color: #ffffff;
            font-size: 12px;
        }

        /* Add Score Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 4px;
            background: #ffffff;
            border: none;
            color: #000000;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fab:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(255, 255, 255, 0.2);
        }

        .fab:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .fab {
                bottom: 20px;
                right: 20px;
                width: 52px;
                height: 52px;
                font-size: 20px;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeInModal 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUpModal 0.3s ease;
        }

        @keyframes slideUpModal {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #808080;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
        }

        .form-input,
        .form-select,
        .form-textarea {
            padding: 12px 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #ffffff;
            background: #0a0a0a;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Inter', monospace;
            font-size: 13px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #2a2a2a;
        }

        .btn-secondary:hover {
            border-color: #ffffff;
            background: #0f0f0f;
        }

        .form-message {
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .form-message.success {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-message.error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .form-message.loading {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #808080;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <!-- Title -->
        <div class="title">
            <div class="title-text">FSM-GANG</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Main</a>
                <a href="stats.html" class="nav-link">Stats</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" data-tab="daily">Daily</button>
                    <button class="tab" data-tab="weekly">Weekly</button>
                    <button class="tab" data-tab="monthly">Monthly</button>
                    <button class="tab" data-tab="alltime">All Time</button>
                </div>

                <!-- High Scores -->
                <div class="high-scores" id="high-scores">
                    <div class="empty-state">
                        <div class="empty-state-text">Loading...</div>
                    </div>
                </div>

                <!-- Game Highlights -->
                <div class="game-highlights" id="game-highlights">
                    <div class="empty-state">
                        <div class="empty-state-text">Loading...</div>
                    </div>
                </div>

                <!-- All-Time Chart -->
                <div id="chart-container" class="chart-container" style="display: none;">
                    <h3 class="section-title">All-Time Points Progression</h3>
                    <canvas id="alltime-chart"></canvas>
                </div>

                <!-- Stats Table -->
                <div class="stats-section">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="name">Player</th>
                                <th class="sortable" data-sort="points">Points</th>
                                <th class="sortable" data-sort="average">Average</th>
                                <th class="sortable" data-sort="games">Games</th>
                            </tr>
                        </thead>
                        <tbody id="stats-body">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 40px;">
                                    <span style="color: #808080;">Loading...</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Game History -->
                <div class="history-section">
                    <div class="section-title">Recent Games</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="Wordle">Wordle</button>
                        <button class="filter-btn" data-filter="TimeGuessr">TimeGuessr</button>
                        <button class="filter-btn" data-filter="Loldle">Loldle</button>
                        <button class="filter-btn" data-filter="Maptap">Maptap</button>
                    </div>
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Game</th>
                                <th>Scores</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <tr>
                                <td colspan="3" style="text-align: center; padding: 40px;">
                                    <span style="color: #808080;">Loading...</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Score Button -->
    <button class="fab" id="add-score-btn">+</button>

    <!-- Modal -->
    <div class="modal" id="score-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Add Score</div>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>

            <form id="score-form">
                <div class="form-group">
                    <label class="form-label">Player</label>
                    <select class="form-select" id="form-player" required>
                        <option value="">Select player...</option>
                        <option value="Gard">Gard</option>
                        <option value="Jone">Jone</option>
                        <option value="Elias">Elias</option>
                        <option value="Herman">Herman</option>
                        <option value="Sindre">Sindre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Results</label>
                    <textarea class="form-textarea" id="form-results" placeholder="Paste your game results here..." required></textarea>
                </div>

                <div id="form-message"></div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Parse & Save</button>
                    <button type="button" class="btn-secondary" id="form-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- IMPORT LOGIC FROM app.js -->
    <script src="app.js"></script>

    <!-- IMPLEMENT RENDER FUNCTIONS THAT USE app.js LOGIC -->
    <script>
        /**
         * Render high scores using calculateHighScores() from app.js
         */
        function renderHighScores(data) {
            const scores = calculateHighScores();
            const html = scores.map((score) => `
                <div class="score-card">
                    <div class="rank-badge">${score.rank}</div>
                    <div class="score-card-name">${score.player}</div>
                    <div class="score-card-value">${score.points}</div>
                </div>
            `).join('');

            document.getElementById('high-scores').innerHTML = html || '<div class="empty-state"><div class="empty-state-text">No data</div></div>';
        }

        /**
         * Render game highlights using calculateGameHighlights() from app.js
         */
        function renderGameHighlights(data) {
            const highlights = calculateGameHighlights();
            const html = GAMES.map(game => {
                const highlight = highlights[game];
                if (!highlight.score) return '';
                return `
                    <div class="game-highlight-card">
                        <div class="game-name">${game}</div>
                        <div class="game-best-score">${highlight.score}</div>
                        <div class="game-best-player">${highlight.player}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('game-highlights').innerHTML = html || '<div class="empty-state"><div class="empty-state-text">No games yet</div></div>';
        }

        /**
         * Render stats table using calculateStats() from app.js
         */
        function renderStats(data) {
            const stats = calculateStats();
            const html = stats.map(p => `
                <tr>
                    <td class="player-cell">${p.name}</td>
                    <td class="points-cell">${p.points}</td>
                    <td>${p.average}</td>
                    <td>${p.games}</td>
                </tr>
            `).join('');

            document.getElementById('stats-body').innerHTML = html || '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #808080;">No data</td></tr>';
        }

        /**
         * Render game history using calculateHistory() from app.js
         */
        function renderHistory(data) {
            const history = calculateHistory();
            const html = history.map(record => {
                const scoreHtml = PARTICIPANTS.map(p => {
                    const score = record.scores[p];
                    if (score === null) return '<span style="color: #808080;">—</span>';
                    return `<span class="score-badge">${p}: ${score}</span>`;
                }).join(' ');

                return `
                    <tr>
                        <td class="date-cell">${record.date}</td>
                        <td class="game-cell">${record.game}</td>
                        <td>${scoreHtml}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('history-body').innerHTML = html || '<tr><td colspan="3" style="text-align: center; padding: 40px; color: #808080;">No games</td></tr>';
        }

        /**
         * Render all-time chart using calculateChartData() from app.js
         */
        function renderChart(data) {
            const chartData = calculateChartData();
            if (!chartData) {
                document.getElementById('chart-container').style.display = 'none';
                return;
            }

            const container = document.getElementById('chart-container');
            const canvas = document.getElementById('alltime-chart');

            const playerColors = {
                'Gard': 'rgb(59, 130, 246)',
                'Jone': 'rgb(239, 68, 68)',
                'Elias': 'rgb(34, 197, 94)',
                'Herman': 'rgb(251, 191, 36)',
                'Sindre': 'rgb(168, 85, 247)'
            };

            const datasets = PARTICIPANTS.map(player => ({
                label: player,
                data: chartData.playerData[player],
                borderColor: playerColors[player],
                backgroundColor: playerColors[player] + '20',
                tension: 0.4,
                fill: false,
                pointRadius: 4,
                pointHoverRadius: 6,
                borderWidth: 2
            }));

            if (window.alltimeChart) {
                window.alltimeChart.destroy();
            }

            const ctx = canvas.getContext('2d');
            window.alltimeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#ffffff',
                                font: { size: 13, weight: '600' }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#808080' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#808080' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });

            container.style.display = 'block';
        }

        /**
         * Update sort UI using global sortColumn and sortDir from app.js
         */
        function updateSortUI() {
            document.querySelectorAll('[data-sort]').forEach(h => {
                h.classList.remove('sort-asc', 'sort-desc');
            });
            const active = document.querySelector(`[data-sort="${sortColumn}"]`);
            if (active) {
                active.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
        }
    </script>
</body>
</html>
