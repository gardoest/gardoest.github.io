<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLE - Daily Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0f2e 50%, #0f1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 4em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff006e, #fb5607, #ffbe0b, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.2em;
            background: linear-gradient(135deg, #fb5607, #ffbe0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #ff006e, #fb5607);
            border: none;
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 0, 110, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            font-size: 1.6em;
            margin-bottom: 25px;
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(135deg, #ff006e, #fb5607) 1;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .leaderboard-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(8px);
        }

        .rank {
            font-size: 2em;
            font-weight: 900;
            width: 60px;
            text-align: center;
            margin-right: 15px;
        }

        .rank-1 { color: #ffb703; text-shadow: 0 0 10px rgba(255, 183, 3, 0.5); }
        .rank-2 { color: #c1c1c1; text-shadow: 0 0 10px rgba(193, 193, 193, 0.5); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }
        .rank-other { color: #8338ec; }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 700;
            font-size: 1.15em;
            margin-bottom: 6px;
        }

        .player-score {
            font-size: 2.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #fb5607);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Input Form Styling */
        .input-section {
            grid-column: 1 / -1;
            order: -1;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field label {
            font-weight: 700;
            font-size: 0.95em;
            color: #ffbe0b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field input,
        .input-field select {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .input-field input:focus,
        .input-field select:focus {
            outline: none;
            border-color: #ff006e;
            background: rgba(255, 0, 110, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .input-field input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .game-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
        }

        .game-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .game-input label {
            font-weight: 700;
            font-size: 0.9em;
            color: #ffbe0b;
        }

        .game-input input {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .game-input input:focus {
            outline: none;
            border-color: #fb5607;
            background: rgba(251, 86, 7, 0.1);
            box-shadow: 0 0 20px rgba(251, 86, 7, 0.3);
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ff006e, #fb5607);
            padding: 14px 40px;
            font-size: 1.05em;
        }

        .btn-clear {
            background: linear-gradient(135deg, #8338ec, #3a0ca3);
            padding: 14px 40px;
            font-size: 1.05em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 700px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #fb5607;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .stat-item h3 {
            color: #ffbe0b;
            font-size: 0.85em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #fb5607);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-player {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .games-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95em;
        }

        .games-table th,
        .games-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .games-table th {
            background: rgba(255, 183, 3, 0.15);
            color: #ffbe0b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .games-table tr:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .game-name {
            color: #ffbe0b;
            font-weight: 700;
        }

        .status-message {
            text-align: center;
            color: #aaa;
            padding: 20px;
            font-style: italic;
        }

        .error {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            color: #ff9999;
        }

        .success {
            background: rgba(100, 255, 100, 0.2);
            border: 1px solid rgba(100, 255, 100, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            color: #99ff99;
        }

        .timestamp {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .full-width-card {
            grid-column: 1 / -1;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ DLE</h1>
            <p class="subtitle">Daily Leaderboard</p>
            <div class="controls">
                <button onclick="loadData()">🔄 Oppdater</button>
                <button onclick="scrollToForm()">✏️ Legg inn resultater</button>
            </div>
            <div id="status-message"></div>
        </header>

        <div class="main-grid">
            <!-- Input Form -->
            <div class="card input-section">
                <h2>📝 Legg inn daglige resultater</h2>

                <div class="form-group">
                    <div class="input-field">
                        <label for="input-date">Dato</label>
                        <input type="date" id="input-date">
                    </div>
                    <div class="input-field">
                        <label for="input-player">Deltaker</label>
                        <select id="input-player">
                            <option value="">Velg deltaker</option>
                            <option value="Gard">Gard</option>
                            <option value="Jone">Jone</option>
                            <option value="Elias">Elias</option>
                            <option value="Herman">Herman</option>
                            <option value="Sindre">Sindre</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label for="webhook-url">Google Apps Script Webhook URL</label>
                        <input type="text" id="webhook-url" placeholder="https://script.google.com/macros/..." value="">
                    </div>
                </div>

                <div>
                    <label style="color: #ffbe0b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 12px;">📋 Paste resultater (fra Loldle, Wordle, TimeGuessr, Maptap)</label>
                    <textarea id="paste-results" placeholder="Lim inn hele teksten fra resultatene dine her..." style="width: 100%; height: 150px; padding: 12px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: #fff; font-size: 0.95em; font-family: monospace; resize: vertical;"></textarea>
                </div>

                <div class="form-buttons">
                    <button class="btn-submit" onclick="submitWithAI()">✨ Parse & Lagre med AI</button>
                    <button class="btn-clear" onclick="clearForm()">🗑️ Nullstill</button>
                </div>
                <div id="form-message"></div>
            </div>

            <!-- Leaderboard -->
            <div class="card">
                <h2>🏆 Stillingstabell</h2>
                <div id="leaderboard" class="leaderboard">
                    <div class="status-message">Laster data...</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="card">
                <h2>📊 All-Time High</h2>
                <div id="stats" class="stats-grid">
                    <div class="status-message">Laster data...</div>
                </div>
            </div>

            <!-- Games Breakdown -->
            <div class="card full-width-card">
                <h2>🎮 Alle resultater</h2>
                <div id="games-breakdown">
                    <div class="status-message">Laster data...</div>
                </div>
            </div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        const SHEET_ID = '13vdyTKv0vgLBnihxBFeriKzkNbvOt1A3n-c3h5ur8g4';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        const PARTICIPANTS = ['Gard', 'Jone', 'Elias', 'Herman', 'Sindre'];
        const GAMES = ['Wordle', 'Timeguessr', 'Loldle', 'Maptap'];

        const GAME_RULES = {
            'Wordle': { type: 'lowest' },
            'Timeguessr': { type: 'highest' },
            'Loldle': { type: 'lowest' },
            'Maptap': { type: 'highest' }
        };

        // Set today's date as default
        document.getElementById('input-date').valueAsDate = new Date();

        // Load webhook URL from localStorage or use default
        const defaultWebhook = 'https://script.google.com/macros/s/AKfycbwo8mFYypq3-7fHLkwj8vv4uC7yYE-VxTYa1IU9n15yCw-9Xgl6Ds-qI6ZxuhzDB14/exec';
        const savedWebhook = localStorage.getItem('webhookUrl') || defaultWebhook;
        document.getElementById('webhook-url').value = savedWebhook;

        // Save webhook URL on change
        document.getElementById('webhook-url').addEventListener('change', (e) => {
            localStorage.setItem('webhookUrl', e.target.value);
        });

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const csv = await response.text();
                const data = parseCSV(csv);

                renderLeaderboard(data);
                renderStats(data);
                renderGamesBreakdown(data);

                document.getElementById('status-message').innerHTML = '<div class="success">✓ Data oppdatert</div>';
                setTimeout(() => { document.getElementById('status-message').innerHTML = ''; }, 3000);
                updateTimestamp();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status-message').innerHTML =
                    `<div class="error">⚠️ Feil ved lasting: ${error.message}</div>`;
            }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return { records: [], scores: {} };

            const header = lines[0].split(',').map(h => h.trim());
            const records = [];

            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(',').map(c => c.trim());
                if (cells.length < 3) continue;

                const record = {
                    date: cells[0],
                    game: cells[1],
                    scores: {}
                };

                for (let j = 0; j < PARTICIPANTS.length; j++) {
                    const scoreStr = cells[2 + j] || '';
                    const score = scoreStr === '' ? null : parseFloat(scoreStr);
                    record.scores[PARTICIPANTS[j]] = score;
                }

                records.push(record);
            }

            // Beregn totalt poeng
            const playerScores = {};
            PARTICIPANTS.forEach(p => { playerScores[p] = 0; });

            records.forEach(record => {
                const game = record.game.trim();
                const participants = PARTICIPANTS.filter(p => record.scores[p] !== null);

                if (participants.length === 0) return;

                const rule = GAME_RULES[game];
                let sorted;

                if (rule.type === 'lowest') {
                    sorted = participants.sort((a, b) => record.scores[a] - record.scores[b]);
                } else {
                    sorted = participants.sort((a, b) => record.scores[b] - record.scores[a]);
                }

                const pointsPerPlace = participants.length;
                sorted.forEach((player, idx) => {
                    const points = pointsPerPlace - idx;
                    playerScores[player] += points;
                });
            });

            return { records, playerScores };
        }

        function renderLeaderboard(data) {
            const sorted = PARTICIPANTS.sort((a, b) => data.playerScores[b] - data.playerScores[a]);

            const html = sorted.map((player, idx) => {
                const rank = idx + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;

                return `
                    <div class="leaderboard-item">
                        <div class="rank ${rankClass}">${medal}</div>
                        <div class="player-info">
                            <div class="player-name">${player}</div>
                            <div class="player-score">${data.playerScores[player]}</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('leaderboard').innerHTML = html;
        }

        function renderStats(data) {
            const gameStats = {};

            GAMES.forEach(game => {
                const gameRecords = data.records.filter(r => r.game.trim() === game);
                if (gameRecords.length === 0) return;

                const rule = GAME_RULES[game];
                let bestRecord = gameRecords[0];
                let bestPlayer = null;
                let bestScore = null;

                gameRecords.forEach(record => {
                    PARTICIPANTS.forEach(player => {
                        if (record.scores[player] === null) return;

                        if (bestScore === null) {
                            bestScore = record.scores[player];
                            bestPlayer = player;
                            bestRecord = record;
                        } else if (rule.type === 'lowest') {
                            if (record.scores[player] < bestScore) {
                                bestScore = record.scores[player];
                                bestPlayer = player;
                                bestRecord = record;
                            }
                        } else {
                            if (record.scores[player] > bestScore) {
                                bestScore = record.scores[player];
                                bestPlayer = player;
                                bestRecord = record;
                            }
                        }
                    });
                });

                gameStats[game] = { player: bestPlayer, score: bestScore, date: bestRecord.date };
            });

            const html = Object.entries(gameStats).map(([game, stat]) => {
                if (!stat.player) return '';
                const icons = { 'Wordle': '📖', 'Timeguessr': '🌍', 'Loldle': '🎮', 'Maptap': '🗺️' };
                return `
                    <div class="stat-item">
                        <h3>${icons[game]} ${game}</h3>
                        <div class="stat-value">${stat.score}</div>
                        <div class="stat-player">🏆 ${stat.player}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('stats').innerHTML = html || '<div class="status-message">Ingen data</div>';
        }

        function renderGamesBreakdown(data) {
            const html = `
                <table class="games-table">
                    <thead>
                        <tr>
                            <th>Dato</th>
                            <th>Konkuranse</th>
                            ${PARTICIPANTS.map(p => `<th>${p}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${data.records.map(record => `
                            <tr>
                                <td><strong>${record.date}</strong></td>
                                <td class="game-name">${record.game}</td>
                                ${PARTICIPANTS.map(p => `<td>${record.scores[p] !== null ? record.scores[p] : '—'}</td>`).join('')}
                            </tr>
                        `).reverse().join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('games-breakdown').innerHTML = data.records.length > 0 ? html : '<div class="status-message">Ingen data</div>';
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = `Sist oppdatert: ${now.toLocaleString('no-NO')}`;
        }

        function scrollToForm() {
            document.querySelector('.input-section').scrollIntoView({ behavior: 'smooth' });
        }

        async function submitWithAI() {
            const date = document.getElementById('input-date').value;
            const player = document.getElementById('input-player').value;
            const text = document.getElementById('paste-results').value;
            const webhookUrl = document.getElementById('webhook-url').value;

            if (!date || !player) {
                document.getElementById('form-message').innerHTML = '<div class="error">⚠️ Velg dato og deltaker</div>';
                return;
            }

            if (!text.trim()) {
                document.getElementById('form-message').innerHTML = '<div class="error">⚠️ Lim inn resultat fra minst en konkuranse</div>';
                return;
            }

            if (!webhookUrl) {
                document.getElementById('form-message').innerHTML = '<div class="error">⚠️ Fyll inn Google Apps Script Webhook URL</div>';
                return;
            }

            const messageDiv = document.getElementById('form-message');
            messageDiv.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ Parser resultat med AI...</div>';

            try {
                // Use Vercel API
                const vercelUrl = 'https://gardoest-github-io.vercel.app/api/parse-results';

                const response = await fetch(vercelUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text,
                        player,
                        date,
                        webhookUrl
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.success) {
                    messageDiv.innerHTML = `
                        <div class="success">
                            ✅ Lagret! ${result.message}<br>
                            ${result.results.map(r => `${r.game}: ${r.score}`).join(', ')}
                        </div>
                    `;
                    loadData(); // Refresh leaderboard
                    clearForm();
                } else {
                    throw new Error(result.error || 'Unknown error');
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="error">❌ Feil: ${error.message}</div>`;
            }
        }

        function clearForm() {
            document.getElementById('input-date').valueAsDate = new Date();
            document.getElementById('input-player').value = '';
            document.getElementById('paste-results').value = '';
            document.getElementById('form-message').innerHTML = '';
        }

        window.addEventListener('load', loadData);
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
