<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Stats - FSM-GANG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Title */
        .title {
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            border-bottom: 2px solid #ffffff;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 32px;
            border: 2px solid #ffffff;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: #ffffff;
            color: #0a0a0a;
        }

        .nav-link.active {
            background: #ffffff;
            color: #0a0a0a;
        }

        @media (max-width: 768px) {
            .title {
                padding: 20px;
                gap: 20px;
            }
            .nav-link {
                font-size: 20px;
                padding: 8px 20px;
            }
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px 20px;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Player Selector */
        .player-selector {
            margin-bottom: 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .player-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid #808080;
            border-radius: 8px;
            color: #808080;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        .player-btn.active {
            border-color: #ffffff;
            color: #ffffff;
            background: linear-gradient(135deg, #ffffff20 0%, #ffffff10 100%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Section Title */
        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #ffffff;
        }

        /* High Scores Grid */
        .high-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .high-scores {
                grid-template-columns: 1fr;
            }
        }

        .score-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .score-card:hover {
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .game-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            margin-bottom: 8px;
        }

        .score-value {
            font-size: 32px;
            font-weight: 900;
            font-family: 'Inter', monospace;
            margin-bottom: 8px;
        }

        .score-meta {
            font-size: 12px;
            color: #808080;
            display: flex;
            justify-content: space-between;
        }

        .score-meta-item {
            display: flex;
            flex-direction: column;
        }

        .score-meta-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Games Table */
        .games-section {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .games-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .games-table thead {
            border-bottom: 2px solid #ffffff;
            background: #0f0f0f;
        }

        .games-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            font-size: 12px;
        }

        .games-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #333333;
        }

        .games-table tbody tr:hover {
            background: #0f0f0f;
        }

        .game-name-cell {
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* Footer */
        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #808080;
            border-top: 2px solid #ffffff;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Title -->
        <div class="title">
            <a href="index.html" class="nav-link">Main</a>
            <a href="stats.html" class="nav-link active">Player Profiles</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- Player Selector -->
                <div id="playerSelectorContainer">
                    <div class="section-title">Select Player</div>
                    <div class="player-selector" id="playerSelector"></div>
                </div>

                <!-- High Scores -->
                <div id="highScoresContainer">
                    <div class="section-title">Personal High Scores</div>
                    <div class="high-scores" id="highScores"></div>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html">Main</a>
            <a href="stats.html">Player Stats</a>
            <span>| FSM-GANG DLE Score Tracker</span>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // ============================================================================
        // PLAYER STATS PAGE - RENDER FUNCTIONS
        // ============================================================================

        let selectedPlayer = 'Gard'; // Default player

        /**
         * Initialize the page
         */
        async function initStatsPage() {
            await loadData();
            renderPlayerSelector();
            renderPlayerStats();
        }

        /**
         * Render player selector buttons
         */
        function renderPlayerSelector() {
            const container = document.getElementById('playerSelector');
            container.innerHTML = '';

            PARTICIPANTS.forEach(player => {
                const btn = document.createElement('button');
                btn.className = `player-btn ${player === selectedPlayer ? 'active' : ''}`;
                btn.textContent = player;
                btn.onclick = () => {
                    selectedPlayer = player;
                    renderPlayerSelector();
                    renderPlayerStats();
                };
                container.appendChild(btn);
            });
        }

        /**
         * Render the selected player's high scores
         */
        function renderPlayerStats() {
            const container = document.getElementById('highScores');
            const gameStats = calculatePlayerGameHighScores(selectedPlayer);

            if (Object.values(gameStats).every(g => g.score === null)) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-title">No games played yet</div>
                        <div class="empty-state-text">${selectedPlayer} hasn't played any games</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            GAMES.forEach(game => {
                const stat = gameStats[game];
                if (stat.score === null) return;

                const card = document.createElement('div');
                card.className = 'score-card';

                const dateStr = new Date(stat.date).toLocaleDateString('no-NO');

                card.innerHTML = `
                    <div class="game-label">${game}</div>
                    <div class="score-value">${Math.round(stat.score)}</div>
                    <div class="score-meta">
                        <div class="score-meta-item">
                            <span class="score-meta-label">Times Played</span>
                            <span>${stat.count}</span>
                        </div>
                        <div class="score-meta-item">
                            <span class="score-meta-label">Date</span>
                            <span>${dateStr}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Initialize page on load
        document.addEventListener('DOMContentLoaded', initStatsPage);

        // Reload data every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
