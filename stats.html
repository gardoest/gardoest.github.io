<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Stats - FSM-GANG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Title */
        .title {
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            border-bottom: 2px solid #ffffff;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 32px;
            border: 2px solid #ffffff;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: #ffffff;
            color: #0a0a0a;
        }

        .nav-link.active {
            background: #ffffff;
            color: #0a0a0a;
        }

        @media (max-width: 768px) {
            .title {
                padding: 20px;
                gap: 20px;
            }
            .nav-link {
                font-size: 20px;
                padding: 8px 20px;
            }
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px 20px;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Player Selector */
        .player-selector {
            margin-bottom: 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .player-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid #808080;
            border-radius: 8px;
            color: #808080;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        .player-btn.active {
            border-color: #ffffff;
            color: #ffffff;
            background: linear-gradient(135deg, #ffffff20 0%, #ffffff10 100%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Section Title */
        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #ffffff;
        }

        /* Carousel Container */
        .carousel-container {
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0 60px;
            perspective: 1200px;
            margin-bottom: 50px;
        }

        .cards-wrapper {
            position: relative;
            width: 200px;
            height: 320px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .card-container {
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -90px;
            margin-top: -150px;
            width: 180px;
            height: 300px;
            transform-style: preserve-3d;
            opacity: 0.15;
            transform: translate(0, 0) scale(0.7);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: auto;
            z-index: 1;
            cursor: pointer;
        }

        .card-container.active {
            opacity: 1;
            transform: translate(0, 0) scale(1);
            pointer-events: auto;
            z-index: 10;
        }

        .card-container:nth-child(2) {
            transform: translateX(140px) scale(0.5) translateZ(-100px);
            opacity: 0.15;
        }

        .card-container:nth-child(4) {
            transform: translateX(-140px) scale(0.5) translateZ(-100px);
            opacity: 0.15;
        }

        .card-container:nth-child(3) {
            transform: translateY(-160px) scale(0.5) translateZ(-100px);
            opacity: 0.15;
        }

        .card-container:nth-child(5) {
            transform: translateY(160px) scale(0.5) translateZ(-100px);
            opacity: 0.15;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        .card-front:hover {
            border-color: #ffffff;
            box-shadow: 0 12px 48px rgba(255, 255, 255, 0.2);
        }

        .card-back {
            transform: rotateY(180deg);
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
        }

        .card-container.active .card-front,
        .card-container.active .card-back {
            border-width: 3px;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            background: linear-gradient(135deg, #ffffff10 0%, #ffffff05 100%);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
        }

        .game-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            margin-bottom: 12px;
        }

        .score-value {
            font-size: 42px;
            font-weight: 900;
            font-family: 'Inter', monospace;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .score-meta {
            font-size: 12px;
            color: #808080;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: center;
        }

        .score-meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .score-meta-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* Navigation buttons */
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ffffff;
            font-size: 32px;
            cursor: pointer;
            padding: 10px 20px;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .carousel-nav:hover {
            color: #808080;
            transform: translateY(-50%) scale(1.2);
        }

        .carousel-nav.prev {
            left: 0;
        }

        .carousel-nav.next {
            right: 0;
        }

        .carousel-nav:active {
            transform: translateY(-50%) scale(0.9);
        }

        @media (max-width: 768px) {
            .carousel-container {
                margin: 0 20px;
            }

            .card-container {
                width: 140px;
                height: 240px;
                margin-left: -70px;
                margin-top: -120px;
            }

            .cards-wrapper {
                width: 140px;
                height: 240px;
            }

            .game-label {
                font-size: 10px;
            }

            .score-value {
                font-size: 32px;
            }

            .carousel-nav {
                font-size: 24px;
                padding: 5px 10px;
            }
        }

        /* Games Table */
        .games-section {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid;
            border-image: linear-gradient(135deg, #ffffff 0%, #808080 100%) 1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .games-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .games-table thead {
            border-bottom: 2px solid #ffffff;
            background: #0f0f0f;
        }

        .games-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            font-size: 12px;
        }

        .games-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #333333;
        }

        .games-table tbody tr:hover {
            background: #0f0f0f;
        }

        .game-name-cell {
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* Footer */
        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #808080;
            border-top: 2px solid #ffffff;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Title -->
        <div class="title">
            <a href="index.html" class="nav-link">Main</a>
            <a href="stats.html" class="nav-link active">Player Profiles</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <!-- Player Selector -->
                <div id="playerSelectorContainer">
                    <div class="section-title">Select Player</div>
                    <div class="player-selector" id="playerSelector"></div>
                </div>

                <!-- High Scores Carousel -->
                <div id="highScoresContainer">
                    <div class="section-title">Personal High Scores</div>
                    <div class="carousel-container">
                        <button class="carousel-nav prev" onclick="rotateCarousel(-1)">◀</button>
                        <div class="cards-wrapper" id="cardsWrapper"></div>
                        <button class="carousel-nav next" onclick="rotateCarousel(1)">▶</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html">Main</a>
            <a href="stats.html">Player Stats</a>
            <span>| FSM-GANG DLE Score Tracker</span>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // ============================================================================
        // PLAYER STATS PAGE - RENDER FUNCTIONS
        // ============================================================================

        let selectedPlayer = 'Gard'; // Default player
        let currentCardIndex = 0;
        let cardsData = [];

        /**
         * Initialize the page
         */
        async function initStatsPage() {
            await loadData();
            renderPlayerSelector();
            renderPlayerStats();
        }

        /**
         * Render player selector buttons
         */
        function renderPlayerSelector() {
            const container = document.getElementById('playerSelector');
            container.innerHTML = '';

            PARTICIPANTS.forEach(player => {
                const btn = document.createElement('button');
                btn.className = `player-btn ${player === selectedPlayer ? 'active' : ''}`;
                btn.textContent = player;
                btn.onclick = () => {
                    selectedPlayer = player;
                    currentCardIndex = 0;
                    renderPlayerSelector();
                    renderPlayerStats();
                };
                container.appendChild(btn);
            });
        }

        /**
         * Render the selected player's high scores as carousel cards
         */
        function renderPlayerStats() {
            const gameStats = calculatePlayerGameHighScores(selectedPlayer);

            cardsData = GAMES.map(game => {
                const stat = gameStats[game];
                if (stat.score === null) {
                    return {
                        game: game,
                        score: '-',
                        date: 'Never',
                        count: 0,
                        hasPlayed: false
                    };
                }

                const dateStr = new Date(stat.date).toLocaleDateString('no-NO');
                return {
                    game: game,
                    score: Math.round(stat.score),
                    date: dateStr,
                    count: stat.count,
                    hasPlayed: true
                };
            });

            initCarousel();
        }

        /**
         * Initialize carousel with card data
         */
        function initCarousel() {
            const wrapper = document.getElementById('cardsWrapper');
            wrapper.innerHTML = '';

            cardsData.forEach((card, idx) => {
                const container = document.createElement('div');
                container.className = 'card-container' + (idx === 0 ? ' active' : '');
                container.id = `card-${idx}`;
                container.onclick = () => selectCard(idx);

                const scoreDisplay = card.hasPlayed ? card.score : '-';
                const dateDisplay = card.hasPlayed ? card.date : 'Not played';

                const cardHtml = `
                    <div class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="game-label">${card.game}</div>
                                <div class="score-value">${scoreDisplay}</div>
                                <div class="score-meta">
                                    <div class="score-meta-item">
                                        <span class="score-meta-label">Times Played</span>
                                        <span>${card.count}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-back">
                                <div class="game-label">${card.game}</div>
                                <div class="score-meta">
                                    <div class="score-meta-item">
                                        <span class="score-meta-label">Best Date</span>
                                        <span>${dateDisplay}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                container.innerHTML = cardHtml;
                wrapper.appendChild(container);
            });

            updateCarousel();
        }

        /**
         * Rotate carousel left or right
         */
        function rotateCarousel(direction) {
            currentCardIndex = (currentCardIndex + direction + cardsData.length) % cardsData.length;
            updateCarousel();
        }

        /**
         * Select a specific card
         */
        function selectCard(index) {
            if (index !== currentCardIndex) {
                currentCardIndex = index;
                updateCarousel();
            } else {
                // Flip card if already selected
                const card = document.querySelector(`#card-${index} .card`);
                if (card) {
                    card.classList.toggle('flipped');
                }
            }
        }

        /**
         * Update carousel positioning and visibility
         */
        function updateCarousel() {
            document.querySelectorAll('.card-container').forEach((el, idx) => {
                const isActive = idx === currentCardIndex;
                el.classList.toggle('active', isActive);

                if (isActive) {
                    el.style.opacity = '1';
                    el.style.transform = 'translate(0, 0) scale(1) translateZ(0)';
                    el.style.zIndex = '10';
                } else {
                    const relativeIndex = (idx - currentCardIndex + cardsData.length) % cardsData.length;
                    let x = 0, y = 0, opacity = 0.15, z = -100;

                    if (relativeIndex === 1 || relativeIndex === cardsData.length - 1) {
                        x = relativeIndex === 1 ? 140 : -140;
                        opacity = 0.15;
                    } else if (relativeIndex === Math.ceil(cardsData.length / 2)) {
                        y = -160;
                        opacity = 0.15;
                    } else if (relativeIndex > Math.ceil(cardsData.length / 2)) {
                        y = 160;
                        opacity = 0.15;
                    }

                    el.style.opacity = opacity.toString();
                    el.style.transform = `translateX(${x}px) translateY(${y}px) scale(0.5) translateZ(${z}px)`;
                    el.style.zIndex = '1';
                }
            });
        }

        // Initialize page on load
        document.addEventListener('DOMContentLoaded', initStatsPage);

        // Reload data every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
